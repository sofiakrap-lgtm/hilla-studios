    <rect x="446" y="1150" width="66" height="22" fill="#7B4DFF"/>
    <rect x="512" y="1150" width="66" height="22" fill="#5B2EE0"/>
    <rect x="578" y="1150" width="66" height="22" fill="#C8F169"/>
    <rect x="644" y="1150" width="66" height="22" fill="#FFD23F"/>
    <rect x="710" y="1150" width="66" height="22" fill="#2ED3C6"/>
