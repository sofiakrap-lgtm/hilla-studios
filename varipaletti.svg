<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1180" viewBox="0 0 900 1180" font-family="'Plus Jakarta Sans', Arial, sans-serif">
  <!-- Tausta -->
  <rect width="900" height="1180" fill="#FFF6EC"/>

  <!-- Otsikko -->
  <text x="50" y="70" font-size="38" font-weight="800" fill="#1E1726">Studio Blomma</text>
  <text x="50" y="105" font-size="20" font-weight="600" fill="#4A4253">Numeroitu väripaletti — brändin perusvärit</text>
  <line x1="50" y1="128" x2="850" y2="128" stroke="#1E1726" stroke-opacity="0.12" stroke-width="2"/>

  <!-- Väririvit -->
  <!-- Jokainen rivi: numero | värinäyte | nimi + hex + muuttuja -->

  <!-- 01 -->
  <text x="50" y="188" font-size="22" font-weight="800" fill="#1E1726">01</text>
  <rect x="95" y="158" width="120" height="60" rx="12" fill="#FFF6EC" stroke="#1E1726" stroke-opacity="0.12" stroke-width="1.5"/>
  <text x="240" y="183" font-size="20" font-weight="700" fill="#1E1726">Kerma</text>
  <text x="240" y="207" font-size="15" font-family="monospace" fill="#4A4253">#FFF6EC   ·   --cream</text>

  <!-- 02 -->
  <text x="50" y="268" font-size="22" font-weight="800" fill="#1E1726">02</text>
